<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="apple-touch-icon" sizes="180x180" href="/icon_glflashcards.png">
<link rel="icon" type="image/png" sizes="180x180" href="/icon_glflashcards.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F3864">
<title>AP Interview Flashcards — Grand Ledge</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --navy:#1F3864; --navy2:#2E4d7b; --amber:#B45309; --amber-bg:#FFF6E0;
    --ink:#1f2733; --gray:#5b6573; --line:#e1e6ee; --bg:#eef1f6; --card:#ffffff;
    --green:#15803d; --green-bg:#e9f6ee; --red:#b91c1c; --red-bg:#fbecec;
  }
  html,body{ height:100%; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); display:flex; flex-direction:column;
    height:100dvh; overflow:hidden;
  }
  /* ---- top bar ---- */
  header{
    background:var(--navy); color:#fff; padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
    flex:0 0 auto;
  }
  .titlerow{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .titlerow h1{ font-size:16px; font-weight:700; letter-spacing:.2px; }
  .counter{ font-size:12.5px; opacity:.85; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .progress{ height:4px; background:rgba(255,255,255,.22); border-radius:3px; margin-top:9px; overflow:hidden; }
  .progress > div{ height:100%; width:0; background:#9ec1ff; transition:width .25s; }
  /* ---- controls ---- */
  .controls{ display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .seg{ display:flex; background:rgba(255,255,255,.12); border-radius:9px; padding:3px; gap:2px; flex:1 1 auto; }
  .seg button{
    flex:1; border:0; background:transparent; color:#cdd9ee; font-size:12.5px; font-weight:600;
    padding:7px 4px; border-radius:7px; cursor:pointer; transition:.15s; white-space:nowrap;
  }
  .seg button.on{ background:#fff; color:var(--navy); }
  .iconbtn{
    border:0; background:rgba(255,255,255,.12); color:#fff; border-radius:9px; padding:0 13px;
    font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px;
  }
  .iconbtn.active{ background:var(--amber); }
  /* ---- card area ---- */
  main{ flex:1 1 auto; padding:14px; display:flex; min-height:0; }
  .card{
    background:var(--card); border-radius:18px; box-shadow:0 6px 22px rgba(31,56,100,.13);
    width:100%; display:flex; flex-direction:column; overflow:hidden;
  }
  .card-meta{
    flex:0 0 auto; padding:13px 16px 0; display:flex; align-items:center; gap:9px; flex-wrap:wrap;
  }
  .tag{ font-size:11px; font-weight:800; letter-spacing:.4px; color:var(--navy); text-transform:uppercase; }
  .star{ font-size:11px; font-weight:800; color:var(--amber); }
  .statepill{ font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; margin-left:auto; }
  .statepill.got{ background:var(--green-bg); color:var(--green); }
  .statepill.again{ background:var(--red-bg); color:var(--red); }
  .card-scroll{ flex:1 1 auto; overflow-y:auto; padding:10px 16px 6px; -webkit-overflow-scrolling:touch; }
  .question{ font-size:21px; line-height:1.34; font-weight:750; color:var(--ink); margin:4px 0 14px; }
  .hint{
    background:#f4f7fc; border-left:4px solid var(--navy2); border-radius:8px; padding:11px 13px;
    font-size:15px; line-height:1.5; color:#37445a; margin-bottom:14px;
  }
  .hint b{ color:var(--navy); }
  .reveal-block{ margin-bottom:8px; }
  .reveal-label{ font-size:11px; font-weight:800; letter-spacing:.4px; color:var(--gray); text-transform:uppercase; margin:14px 0 5px; }
  .reveal-body{ font-size:15.5px; line-height:1.55; color:#2b3442; }
  .reveal-body.amber{ background:var(--amber-bg); border-radius:8px; padding:11px 13px; font-style:italic; }
  .tags-row{ margin-top:12px; display:flex; flex-wrap:wrap; gap:6px; }
  .chip{ background:#eef3fb; color:var(--navy); font-size:11.5px; font-weight:700; padding:4px 9px; border-radius:20px; }
  .warn{ color:var(--amber); font-weight:700; }
  /* ---- buttons under card ---- */
  .actions{ flex:0 0 auto; padding:10px 16px calc(env(safe-area-inset-bottom) + 12px); display:flex; flex-direction:column; gap:8px; }
  .bigbtn{
    border:0; border-radius:13px; padding:15px; font-size:16px; font-weight:750; cursor:pointer;
    width:100%; transition:.12s; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .bigbtn:active{ transform:scale(.985); }
  .reveal-btn{ background:var(--navy); color:#fff; }
  .hint-btn{ background:#dde6f4; color:var(--navy); }
  .nav-row{ display:flex; gap:8px; }
  .rate-row{ display:flex; gap:8px; }
  .nav-row button{ flex:1; }
  .prevbtn{ background:#e7ebf2; color:#46505f; }
  .nextbtn{ background:var(--navy2); color:#fff; }
  .gotbtn{ background:var(--green); color:#fff; flex:1; }
  .againbtn{ background:#d97706; color:#fff; flex:1; }
  .muted-small{ text-align:center; font-size:12px; color:var(--gray); padding:2px 0; }
  /* ---- empty state ---- */
  .empty{ text-align:center; margin:auto; padding:30px; color:var(--gray); }
  .empty h2{ color:var(--navy); font-size:18px; margin-bottom:8px; }
  .empty button{ margin-top:14px; background:var(--navy); color:#fff; border:0; padding:11px 18px; border-radius:10px; font-weight:700; font-size:14px; }
  /* ---- menu sheet ---- */
  .sheet-backdrop{ position:fixed; inset:0; background:rgba(20,28,45,.45); display:none; z-index:50; }
  .sheet-backdrop.show{ display:block; }
  .sheet{
    position:fixed; left:0; right:0; bottom:0; background:#fff; border-radius:20px 20px 0 0; z-index:51;
    padding:18px 18px calc(env(safe-area-inset-bottom) + 18px); transform:translateY(100%); transition:transform .25s;
    box-shadow:0 -8px 30px rgba(0,0,0,.2);
  }
  .sheet.show{ transform:translateY(0); }
  .sheet h3{ font-size:16px; color:var(--navy); margin-bottom:4px; }
  .sheet p{ font-size:13px; color:var(--gray); margin-bottom:14px; line-height:1.4; }
  .sheet .row{ display:flex; gap:8px; }
  .sheet .row button{ flex:1; border:0; border-radius:11px; padding:13px; font-weight:700; font-size:14px; cursor:pointer; }
  .resetbtn{ background:var(--red-bg); color:var(--red); }
  .closebtn{ background:#eef1f6; color:#46505f; }
  .stats{ display:flex; gap:10px; margin-bottom:16px; }
  .stat{ flex:1; background:#f4f7fc; border-radius:12px; padding:12px; text-align:center; }
  .stat .n{ font-size:22px; font-weight:800; color:var(--navy); font-variant-numeric:tabular-nums; }
  .stat .l{ font-size:11px; color:var(--gray); margin-top:2px; }
</style>
</head>
<body>
<header>
  <div class="titlerow">
    <h1>AP Interview Cards</h1>
    <span class="counter" id="counter">0 / 0</span>
  </div>
  <div class="progress"><div id="progbar"></div></div>
  <div class="controls">
    <div class="seg" id="setSeg">
      <button data-set="all" class="on">All</button>
      <button data-set="universal">Universal</button>
      <button data-set="grandledge">Grand Ledge</button>
    </div>
    <button class="iconbtn" id="starBtn">★ Must</button>
    <button class="iconbtn" id="menuBtn">▤</button>
  </div>
</header>

<main id="main"></main>

<!-- menu sheet -->
<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <h3>Session</h3>
  <p>Progress saves automatically on this device.</p>
  <div class="stats">
    <div class="stat"><div class="n" id="statGot">0</div><div class="l">Got it</div></div>
    <div class="stat"><div class="n" id="statAgain">0</div><div class="l">Practice</div></div>
    <div class="stat"><div class="n" id="statLeft">0</div><div class="l">Unmarked</div></div>
  </div>
  <div class="row" style="margin-bottom:8px;">
    <button class="closebtn" id="practiceOnly">Practice "again" only</button>
  </div>
  <div class="row">
    <button class="resetbtn" id="resetBtn">Reset all progress</button>
    <button class="closebtn" id="closeSheet">Close</button>
  </div>
</div>

<script>
const CARDS = [
 {
  "id": "Q1",
  "set": "universal",
  "star": true,
  "cat": "Openers",
  "q": "Tell us about yourself and your journey to this point.",
  "hint": "90-second arc that ends with why this role, why now. Not a resume recital.",
  "look": "A coherent arc, not a list. Do they land on why-this-role?",
  "align": "15 years secondary → interim AP at 1,200-student Okemos → seeking the permanent seat. End forward-looking.",
  "tags": [
   "MID-YEAR COLD START"
  ],
  "notes": "Don't start at college. Start: “I've spent 15 years in secondary education.”"
 },
 {
  "id": "Q2",
  "set": "universal",
  "cat": "Openers",
  "q": "Why do you want to be an assistant principal?",
  "hint": "Run toward the job, not away from the classroom.",
  "look": "Kids, systems, staff support — not classroom fatigue.",
  "align": "The moment you realized the office helps more kids than one classroom. The tracker proves you like the unglamorous parts.",
  "tags": [
   "THE TRACKER"
  ],
  "notes": "Never sound classroom-fatigued."
 },
 {
  "id": "Q3",
  "set": "universal",
  "star": true,
  "cat": "Openers",
  "q": "Why are you leaving your current position?",
  "hint": "Clean, non-bitter. The interim ended as designed.",
  "look": "No bitterness. A clean narrative.",
  "align": "“I served as Interim AP while our principal was on leave. He returned, the interim ended as designed, and I'm back in the classroom while I pursue a permanent administrative seat. The interim confirmed this is the work I want.”",
  "tags": [],
  "notes": "MEMORIZE word-for-word. Zero negativity about Okemos. One sentence, then pivot to them."
 },
 {
  "id": "Q4",
  "set": "universal",
  "cat": "Openers",
  "q": "What is your leadership philosophy?",
  "hint": "Concrete enough to predict your behavior.",
  "look": "Something behavioral, not a poster slogan.",
  "align": "“A good administrator provides support and removes barriers.” Then prove it with a story.",
  "tags": [
   "THE TRACKER",
   "UNION PRESIDENT"
  ],
  "notes": "Servant leadership without the buzzword."
 },
 {
  "id": "Q5",
  "set": "universal",
  "cat": "Openers",
  "q": "What do you think the role of an assistant principal actually is?",
  "hint": "Discipline, attendance, operations, visibility — without resentment.",
  "look": "Realistic grasp of the gritty parts, embraced not endured.",
  "align": "“The AP owns the daily operational weight so teaching and leading can happen. I like that work; it's where consistency is built.”",
  "tags": [],
  "notes": ""
 },
 {
  "id": "Q6",
  "set": "universal",
  "cat": "Openers",
  "q": "What makes you the right fit for a school like ours?",
  "hint": "Show you researched THEM specifically.",
  "look": "District-specific evidence, not generic fit.",
  "align": "Swap in district specifics. Core: secondary range, systems builder, relationship-centered discipline, stability.",
  "tags": [],
  "notes": ""
 },
 {
  "id": "Q7",
  "set": "universal",
  "cat": "Openers",
  "q": "Describe your ideal working relationship with your principal.",
  "hint": "Loyalty + communication; no daylight in public.",
  "look": "Will you make the principal's job easier and never surprise them?",
  "align": "“Aligned in public, honest in private. I over-communicate up; my principal never gets surprised.”",
  "tags": [
   "MID-YEAR COLD START"
  ],
  "notes": ""
 },
 {
  "id": "Q8",
  "set": "universal",
  "cat": "Openers",
  "q": "What's your experience with students at this grade band?",
  "hint": "Comfort across the building's full range.",
  "look": "Are you at home with every age in the building?",
  "align": "15 years 9-12; charter + K-8 summer program cover younger kids.",
  "tags": [
   "TRAUMA-INFORMED YEARS"
  ],
  "notes": "⚠ Don't oversell middle-level depth. “Same fairness, different delivery.”"
 },
 {
  "id": "Q9",
  "set": "universal",
  "star": true,
  "cat": "Discipline & Safety",
  "q": "Describe your approach to student discipline.",
  "hint": "Protect the struggling kid AND the learning environment. Consistency.",
  "look": "A philosophy that holds both kid and classroom, applied consistently.",
  "align": "Your philosophy line verbatim, then a kid story.",
  "tags": [
   "PHILOSOPHY",
   "THE KID WHO TURNED"
  ],
  "notes": "Anchor answer. Rehearse until it bores you."
 },
 {
  "id": "Q10",
  "set": "universal",
  "cat": "Discipline & Safety",
  "q": "Walk us through how you handle a referral, start to finish.",
  "hint": "Investigate → due process → communicate → document → follow up.",
  "look": "Process thinking, including closing the loop with the teacher.",
  "align": "Hear teacher, hear kid, gather facts, decide with data + history, call family AND close the loop with the referring teacher same day, document, follow up.",
  "tags": [
   "DOCUMENTATION STANDARD"
  ],
  "notes": "Pro move: “Referrals never vanish into a black hole.” Most candidates forget the teacher loop."
 },
 {
  "id": "Q11",
  "set": "universal",
  "cat": "Discipline & Safety",
  "q": "A teacher sends the same student a third time this week: “I don't want them back in my room.”",
  "hint": "Support teacher AND student; find root cause; no instant capitulation.",
  "look": "Balance, root-cause thinking, real follow-through.",
  "align": "Data first (the pattern, what's happening that hour), talk to both, re-entry plan with supports, honest follow-through.",
  "tags": [
   "THE TRACKER"
  ],
  "notes": "Reference the “same three students over and over” line; consistency prevents this."
 },
 {
  "id": "Q12",
  "set": "universal",
  "star": true,
  "cat": "Discipline & Safety",
  "q": "How do you ensure discipline is fair and consistent across all students?",
  "hint": "Bias awareness + data + documentation + a progressive matrix.",
  "look": "Systems that remove “depends who's asking.”",
  "align": "Written standards; referral data reviewed for patterns; consequences mapped to a progressive matrix.",
  "tags": [
   "THE TRACKER",
   "DOCUMENTATION STANDARD"
  ],
  "notes": ""
 },
 {
  "id": "Q13",
  "set": "universal",
  "cat": "Discipline & Safety",
  "q": "What does PBIS look like when it's done well?",
  "hint": "More than posters: taught expectations, reinforcement, data, tiers.",
  "look": "Real implementation understanding, not buzzwords.",
  "align": "Reinforced PBIS-aligned systems mid-year at a 1,200-student building.",
  "tags": [
   "MID-YEAR COLD START"
  ],
  "notes": "⚠ You reinforced, didn't build from scratch. “I've seen what makes it stick and what makes staff roll their eyes.”"
 },
 {
  "id": "Q14",
  "set": "universal",
  "cat": "Discipline & Safety",
  "q": "What role do restorative practices play in your approach?",
  "hint": "Balanced — not never-suspend, not skeptic.",
  "look": "A measured view of restorative practice.",
  "align": "Philosophy line. Differentiator: restoration never lands as extra work on a teacher's desk.",
  "tags": [
   "PHILOSOPHY"
  ],
  "notes": ""
 },
 {
  "id": "Q15",
  "set": "universal",
  "cat": "Discipline & Safety",
  "q": "When is suspension the right call?",
  "hint": "Safety, severity, pattern, statute — plus its cost.",
  "look": "Judgment, not reflex in either direction.",
  "align": "“When a student's presence makes learning impossible or the building unsafe. But a suspension without a re-entry plan is a vacation with a grudge attached. Mine come with a way back.”",
  "tags": [],
  "notes": ""
 },
 {
  "id": "Q16",
  "set": "universal",
  "cat": "Discipline & Safety",
  "q": "Two students fight in the cafeteria. Walk us through your response.",
  "hint": "Safety-first sequence → communication → documentation → debrief.",
  "look": "A calm, correct sequence and a systems debrief.",
  "align": "Separate/secure, medical check, separate statements, video, parents before buses, consequences per code with history, SRO if injury/statute, re-entry plan, document, fix the supervision gap.",
  "tags": [],
  "notes": "Pro move: end with the systems question — why was the cafeteria a place this could happen?"
 },
 {
  "id": "Q17",
  "set": "universal",
  "cat": "Discipline & Safety",
  "q": "You hear a rumor a student has a weapon at school. What do you do?",
  "hint": "Immediate action, protocol, never solo heroics.",
  "look": "Treat as credible; protocol fluency.",
  "align": "Locate and isolate the student calmly, principal and SRO immediately, search per policy with a witness, document. Never wait, never search alone, never assume.",
  "tags": [],
  "notes": ""
 },
 {
  "id": "Q18",
  "set": "universal",
  "cat": "Discipline & Safety",
  "q": "A student tells you they're thinking about hurting themselves.",
  "hint": "Never alone → warm handoff → parent same day → documented follow-up.",
  "look": "Protocol plus humanity.",
  "align": "Stay with them, listen without interrogating, warm handoff to counselor, risk protocol, parent contact with counselor same day, safety plan, follow-up they don't have to ask for.",
  "tags": [],
  "notes": "Land it: “The kid needs to know an adult moved fast and stayed kind.”"
 },
 {
  "id": "Q19",
  "set": "universal",
  "cat": "Discipline & Safety",
  "q": "How do you handle vaping / phones / the behavior issue of the year?",
  "hint": "Realistic enforcement + consistency, not assemblies.",
  "look": "Enforceable, consistent, with supports where there's addiction.",
  "align": "Expectations taught up front, tiered consequences, supports for addiction, staff backed when they enforce.",
  "tags": [],
  "notes": "“A policy teachers won't enforce isn't a policy, it's a poster.”"
 },
 {
  "id": "Q20",
  "set": "universal",
  "cat": "Discipline & Safety",
  "q": "How would you address bullying, including online behavior from outside school?",
  "hint": "Seriousness, school-nexus, protect the target, work both kids.",
  "look": "Legal reach + protection + follow-up.",
  "align": "Investigate fully, document, contact both families, consequences plus monitoring, supports for the target, unprompted follow-up. Online conduct that disrupts school walks in with the kid.",
  "tags": [],
  "notes": ""
 },
 {
  "id": "Q21",
  "set": "universal",
  "star": true,
  "cat": "Discipline & Safety",
  "q": "A special education student commits a suspendable offense. How is your process different?",
  "hint": "Manifestation determination, 10-day threshold, IEP team, FAPE.",
  "look": "This separates real candidates from pretenders.",
  "align": "You flagged IEP/manifestation in real write-ups: track cumulative days, loop in the case manager early, MDR before any decision that looks like a pattern of removal.",
  "tags": [
   "DOCUMENTATION STANDARD"
  ],
  "notes": "You have genuine material here. Slow down."
 },
 {
  "id": "Q22",
  "set": "universal",
  "cat": "Discipline & Safety",
  "q": "How do you build positive school culture, not just manage behavior?",
  "hint": "Proactive: relationships, visibility, recognition, student voice.",
  "look": "A culture vision beyond consequences.",
  "align": "Doors, halls, cafeteria, events; know names; catch kids doing right; reinforced culture mid-year with no honeymoon.",
  "tags": [
   "MID-YEAR COLD START",
   "THE KID WHO TURNED"
  ],
  "notes": ""
 },
 {
  "id": "Q23",
  "set": "universal",
  "cat": "Discipline & Safety",
  "q": "Two students tell opposite stories and you saw nothing. Now what?",
  "hint": "Investigate; act on preponderance; document why.",
  "look": "Fairness under ambiguity.",
  "align": "Separate statements, witnesses, video, evidence; history as context not verdict; act on preponderance and document.",
  "tags": [],
  "notes": "“Sometimes the honest call is a lesser consequence and closer monitoring.”"
 },
 {
  "id": "Q24",
  "set": "universal",
  "star": true,
  "cat": "Attendance & Data",
  "q": "What's your approach to improving student attendance?",
  "hint": "Systems + relationships + tiers. Not just truancy letters.",
  "look": "Your strongest category. Own it.",
  "align": "Full tracker story, then the relational layer: the “what's going on?” call before the letter that threatens.",
  "tags": [
   "THE TRACKER"
  ],
  "notes": "Slow down. This is your home turf."
 },
 {
  "id": "Q25",
  "set": "universal",
  "cat": "Attendance & Data",
  "q": "How do you use data to make decisions?",
  "hint": "Tools → decisions, not spreadsheets for their own sake.",
  "look": "Data that changes what you do.",
  "align": "“Data is a map, not a scoreboard.” Attendance trends, referral patterns, grade trajectories drive individual moves. NWEA experience.",
  "tags": [
   "THE TRACKER"
  ],
  "notes": ""
 },
 {
  "id": "Q26",
  "set": "universal",
  "cat": "Attendance & Data",
  "q": "Tell us about your experience with MTSS / tiered intervention.",
  "hint": "Tiers, data review, intervention matching, progress monitoring.",
  "look": "Practical fluency.",
  "align": "Facilitated MTSS intervention meetings at Okemos; served on building data-review teams as a teacher.",
  "tags": [],
  "notes": "⚠ You ran meetings, didn't design the framework. “I'd learn how yours is wired before changing a thing.”"
 },
 {
  "id": "Q27",
  "set": "universal",
  "cat": "Attendance & Data",
  "q": "A third of your student body is chronically absent. Where do you start?",
  "hint": "Diagnose before prescribing; tier it; post-COVID realism.",
  "look": "It isn't one problem, so it isn't one strategy.",
  "align": "Which kids, which patterns (Mondays? first hour? transport?). Then tiers: universal culture, targeted outreach, intensive case management.",
  "tags": [
   "THE TRACKER"
  ],
  "notes": "“You can't fix 30% with one strategy because it isn't one problem.”"
 },
 {
  "id": "Q28",
  "set": "universal",
  "cat": "Attendance & Data",
  "q": "How do you know whether an intervention is actually working?",
  "hint": "Set metric + date; review on schedule; change the support, not the goal.",
  "look": "Progress-monitoring discipline.",
  "align": "Set the metric and date when it starts; review on schedule; change the support, not the goalpost.",
  "tags": [
   "THE KID WHO TURNED"
  ],
  "notes": ""
 },
 {
  "id": "Q29",
  "set": "universal",
  "star": true,
  "cat": "Instructional Leadership",
  "q": "How do you support teachers?",
  "hint": "Concrete acts, not vibes.",
  "look": "Specific barrier-removal.",
  "align": "Remove barriers: no chasing data, no vanished follow-through, no same-three-kids carousel. The tracker was built FOR teachers. Backed enforcement.",
  "tags": [
   "THE TRACKER"
  ],
  "notes": ""
 },
 {
  "id": "Q30",
  "set": "universal",
  "cat": "Instructional Leadership",
  "q": "Describe your experience observing and evaluating teachers.",
  "hint": "Framework fluency + evidence-based feedback + honest scope.",
  "look": "Real feedback experience, honest about evaluator-of-record gap.",
  "align": "Danielson-aligned feedback through TLT, student teachers, long-term subs; supported supervision as interim AP.",
  "tags": [
   "TLT"
  ],
  "notes": "⚠ Not yet evaluator of record through full cycles. Name it + “principal mentorship in year one.”"
 },
 {

// ---------- state ----------
const LS_KEY = "ap_flashcards_v1";
let state = { set:"all", starOnly:false, practiceOnly:false, marks:{}, order:[], pos:0 };
try { const s = JSON.parse(localStorage.getItem(LS_KEY)); if(s){ state.marks = s.marks||{}; } } catch(e){}

function saveMarks(){ try { localStorage.setItem(LS_KEY, JSON.stringify({marks:state.marks})); } catch(e){} }

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function pool(){
  return CARDS.filter(c=>{
    if(state.set!=="all" && c.set!==state.set) return false;
    if(state.starOnly && !c.star) return false;
    if(state.practiceOnly && state.marks[c.id]!=="again") return false;
    return true;
  });
}

function buildOrder(keepCurrent){
  const ids = pool().map(c=>c.id);
  let cur = state.order[state.pos];
  state.order = shuffle(ids.slice());
  if(keepCurrent && cur && state.order.includes(cur)){
    state.order = [cur, ...state.order.filter(x=>x!==cur)];
    state.pos = 0;
  } else {
    state.pos = 0;
  }
}

let stage = 0; // 0=question, 1=hint shown, 2=full

function render(){
  const main = document.getElementById("main");
  const list = state.order;
  updateStats();
  if(list.length===0){
    main.innerHTML = `<div class="empty"><h2>No cards match</h2><p>Your filters hid everything. Loosen them to keep practicing.</p><button id="clearFilters">Clear filters</button></div>`;
    document.getElementById("clearFilters").onclick=()=>{ state.starOnly=false; state.practiceOnly=false; syncControls(); buildOrder(false); stage=0; render(); };
    document.getElementById("counter").textContent="0 / 0";
    document.getElementById("progbar").style.width="0%";
    return;
  }
  if(state.pos>=list.length) state.pos=0;
  const c = CARDS.find(x=>x.id===list[state.pos]);
  const mark = state.marks[c.id];
  document.getElementById("counter").textContent = `${state.pos+1} / ${list.length}`;
  document.getElementById("progbar").style.width = `${((state.pos+1)/list.length)*100}%`;

  let pill = "";
  if(mark==="got") pill = `<span class="statepill got">✓ Got it</span>`;
  else if(mark==="again") pill = `<span class="statepill again">↻ Practice</span>`;

  let body = `
    <div class="card">
      <div class="card-meta">
        <span class="tag">${c.id} · ${c.cat}</span>
        ${c.star?`<span class="star">★ MUST-NAIL</span>`:""}
        ${pill}
      </div>
      <div class="card-scroll" id="scroll">
        <div class="question">${c.q}</div>`;

  if(stage>=1){
    body += `<div class="hint">${c.hint}</div>`;
  }
  if(stage>=2){
    body += `
      <div class="reveal-block">
        <div class="reveal-label">Likely looking for</div>
        <div class="reveal-body">${c.look}</div>
        <div class="reveal-label">Your alignment</div>
        <div class="reveal-body amber">${c.align}</div>`;
    if(c.tags && c.tags.length){
      body += `<div class="tags-row">` + c.tags.map(t=>`<span class="chip">${t}</span>`).join("") + `</div>`;
    }
    if(c.notes){
      body += `<div class="reveal-label">Important notes</div><div class="reveal-body">${c.notes.replace(/⚠/g,'<span class="warn">⚠</span>')}</div>`;
    }
    body += `</div>`;
  }

  body += `</div></div>`; // close scroll + card... wait
  main.innerHTML = body;

  // actions
  const actions = document.createElement("div");
  actions.className="actions";
  let btns = "";
  if(stage===0){
    btns += `<button class="bigbtn hint-btn" id="hintBtn">💡 Reveal hint</button>`;
    btns += `<button class="bigbtn reveal-btn" id="revealBtn">Show full answer</button>`;
  } else if(stage===1){
    btns += `<button class="bigbtn reveal-btn" id="revealBtn">Show full answer</button>`;
  } else {
    btns += `<div class="rate-row">
        <button class="bigbtn againbtn" id="againBtn">↻ Practice again</button>
        <button class="bigbtn gotbtn" id="gotBtn">✓ Got it</button>
      </div>`;
  }
  btns += `<div class="nav-row">
      <button class="bigbtn prevbtn" id="prevBtn">‹ Prev</button>
      <button class="bigbtn nextbtn" id="nextBtn">Next ›</button>
    </div>`;
  actions.innerHTML = btns;
  document.querySelector(".card").appendChild(actions);

  // wire
  const hb=document.getElementById("hintBtn"); if(hb) hb.onclick=()=>{ stage=1; render(); };
  const rb=document.getElementById("revealBtn"); if(rb) rb.onclick=()=>{ stage=2; render(); };
  const gb=document.getElementById("gotBtn"); if(gb) gb.onclick=()=>{ state.marks[c.id]="got"; saveMarks(); next(); };
  const ab=document.getElementById("againBtn"); if(ab) ab.onclick=()=>{ state.marks[c.id]="again"; saveMarks(); next(); };
  document.getElementById("prevBtn").onclick=prev;
  document.getElementById("nextBtn").onclick=next;
}

function next(){
  if(state.order.length===0) return;
  state.pos++;
  if(state.pos>=state.order.length){ buildOrder(false); } // reshuffle at end
  stage=0; render();
}
function prev(){
  if(state.order.length===0) return;
  state.pos = (state.pos-1+state.order.length)%state.order.length;
  stage=0; render();
}

function updateStats(){
  const inScope = CARDS.filter(c=> state.set==="all"||c.set===state.set);
  let got=0, again=0;
  inScope.forEach(c=>{ if(state.marks[c.id]==="got")got++; else if(state.marks[c.id]==="again")again++; });
  const left = inScope.length-got-again;
  const sg=document.getElementById("statGot"), sa=document.getElementById("statAgain"), sl=document.getElementById("statLeft");
  if(sg){ sg.textContent=got; sa.textContent=again; sl.textContent=left; }
}

function syncControls(){
  document.querySelectorAll("#setSeg button").forEach(b=>b.classList.toggle("on", b.dataset.set===state.set));
  document.getElementById("starBtn").classList.toggle("active", state.starOnly);
}

// set toggle
document.querySelectorAll("#setSeg button").forEach(b=>{
  b.onclick=()=>{ state.set=b.dataset.set; state.practiceOnly=false; syncControls(); buildOrder(false); stage=0; render(); };
});
// star toggle
document.getElementById("starBtn").onclick=()=>{ state.starOnly=!state.starOnly; syncControls(); buildOrder(false); stage=0; render(); };
// menu
const backdrop=document.getElementById("backdrop"), sheet=document.getElementById("sheet");
function openSheet(){ updateStats(); backdrop.classList.add("show"); sheet.classList.add("show"); }
function closeSheet(){ backdrop.classList.remove("show"); sheet.classList.remove("show"); }
document.getElementById("menuBtn").onclick=openSheet;
document.getElementById("closeSheet").onclick=closeSheet;
backdrop.onclick=closeSheet;
document.getElementById("resetBtn").onclick=()=>{
  if(confirm("Reset all got-it / practice marks?")){ state.marks={}; saveMarks(); state.practiceOnly=false; syncControls(); buildOrder(false); stage=0; render(); closeSheet(); }
};
document.getElementById("practiceOnly").onclick=()=>{
  state.practiceOnly=true; state.starOnly=false; syncControls(); buildOrder(false); stage=0; render(); closeSheet();
};

// swipe support
let tx=0;
document.getElementById("main").addEventListener("touchstart",e=>{ tx=e.changedTouches[0].clientX; },{passive:true});
document.getElementById("main").addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const sc=document.getElementById("scroll");
  if(Math.abs(dx)>60){ if(dx<0) next(); else prev(); }
},{passive:true});

// init
syncControls();
buildOrder(false);
render();
</script>
</body>
</html>
