<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="/icon_hub.png">
<link rel="icon" type="image/png" sizes="180x180" href="/icon_hub.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mobile Apps</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #f2f2f7;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #1c1c1e;
            margin-bottom: 30px;
        }
        .app-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 18px;
            margin: 12px auto;
            max-width: 320px;
            border-radius: 12px;
            text-decoration: none;
            color: #007aff;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .app-link:active {
            background-color: #e5e5ea;
        }
        .arrow {
            color: #c7c7cc;
        }
    </style>
</head>
<body>

    <h1>My Dashboard</h1>
    
    <a href="./flashcards/" class="app-link">
        <span>🗂️ GL Flashcards App</span>
        <span class="arrow">➔</span>
    </a>

    <a href="./packet/" class="app-link">
        <span>📄 GL Study Packet</span>
        <span class="arrow">➔</span>
    </a>

</body>
</html>
